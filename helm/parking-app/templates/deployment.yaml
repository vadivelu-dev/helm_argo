apiVersion: apps/v1
kind: Deployment
metadata:
  name: parking-app
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: parking-app
  template:
    metadata:
      labels:
        app: parking-app
    spec:
      containers:
        - name: parking-app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 5000
